name: Convert Python to Java (Coding Agent)

on:
  push:
    paths:
      - '**.py'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- '*.py' || true)
          if [ -z "$FILES" ]; then
            echo "No Python files changed."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed Python files:"
            echo "$FILES"
            {
              echo "files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue and assign to Copilot
        if: steps.changed.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build file list for the issue body
          FILE_LIST=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            FILE_LIST="${FILE_LIST}- \`${f}\`"$'\n'
          done <<< "${{ steps.changed.outputs.files }}"

          FILE_COUNT=$(echo "${{ steps.changed.outputs.files }}" | grep -c '[^[:space:]]')
          FIRST_FILE=$(echo "${{ steps.changed.outputs.files }}" | head -1)

          BODY="## Convert Python files to Java

          The following Python files were added or modified in commit ${{ github.sha }} and need to be converted to equivalent Java code:

          ${FILE_LIST}

          ### Instructions
          For each Python file listed above:
          1. Read the Python source code
          2. Create an equivalent Java file **in the same directory**
          3. The Java class name must match the file name with the first letter capitalized (e.g. \`hello.py\` → \`Hello.java\`)
          4. Write idiomatic, working Java code
          5. Do **not** modify or delete the original Python files
          6. Commit all changes and open a pull request with title: \`auto: convert Python files to Java\`"

          TITLE="Convert Python to Java: ${FIRST_FILE} (${FILE_COUNT} file(s))"

          # Create the issue and capture the issue URL
          ISSUE_URL=$(gh issue create \
            --title "$TITLE" \
            --body "$BODY")

          echo "Created issue: $ISSUE_URL"

          # Extract issue number from URL
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')

          # Assign the issue to Copilot coding agent via REST API
          # This requires Copilot coding agent to be enabled in the repo settings
          HTTP_STATUS=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/assignees" \
            -f "assignees[]=copilot" \
            2>&1) && {
            echo "Assigned issue #${ISSUE_NUMBER} to Copilot coding agent"
          } || {
            echo "::warning::Could not assign Copilot to issue #${ISSUE_NUMBER}."
            echo "::warning::Make sure Copilot coding agent is enabled: Settings → Copilot → Coding agent"
            echo "::warning::You can manually assign 'copilot' to issue #${ISSUE_NUMBER} from the GitHub UI."
          }
