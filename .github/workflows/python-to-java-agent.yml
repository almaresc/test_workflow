name: Create Java to PySpark Translation Issues

on:
  push:
    paths:
      - 'to_translate/**/*.java'
      - 'translated/**/*.py'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Java files that need translation
        id: files
        run: |
          set -euo pipefail

          EMPTY_TREE_SHA=$(git hash-object -t tree /dev/null)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if git rev-parse HEAD^ >/dev/null 2>&1; then
              BASE_REF="HEAD^"
            else
              BASE_REF="$EMPTY_TREE_SHA"
            fi
            HEAD_REF="HEAD"
          else
            BASE_REF="${{ github.event.before }}"
            HEAD_REF="${{ github.sha }}"

            if [ "$BASE_REF" = "0000000000000000000000000000000000000000" ]; then
              BASE_REF="$EMPTY_TREE_SHA"
            fi
          fi

          declare -A FILE_REASONS=()

          while IFS=$'\t' read -r change_type source_file; do
            [ -z "$change_type" ] && continue
            [ -z "$source_file" ] && continue
            FILE_REASONS["$source_file"]="$change_type"
          done < <(
            git diff --name-status --diff-filter=AM "$BASE_REF" "$HEAD_REF" |
            awk '$1 ~ /^(A|M)$/ && $2 ~ /^to_translate\/.*\.java$/ { print $1 "\t" $2 }'
          )

          while IFS= read -r source_file; do
            [ -z "$source_file" ] && continue

            relative_path="${source_file#to_translate/}"
            target_file="translated/${relative_path%.java}.py"

            if [ ! -f "$target_file" ] && [ -z "${FILE_REASONS[$source_file]+x}" ]; then
              FILE_REASONS["$source_file"]="N"
            fi
          done < <(find to_translate -type f -name '*.java' | sort)

          mapfile -t FILES < <(
            for source_file in "${!FILE_REASONS[@]}"; do
              printf '%s\t%s\n' "${FILE_REASONS[$source_file]}" "$source_file"
            done | sort -k2
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No Java files need translation."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf 'Found %s Java file(s) that need translation:\n' "${#FILES[@]}"
          printf '%s\n' "${FILES[@]}"

          {
            echo "has_files=true"
            echo "files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue for each Java file
        if: steps.files.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PAT_TOKEN is not configured."
            echo "Create a classic PAT with repo scope, or a fine-grained token with read access to metadata and read/write access to actions, contents, issues, and pull requests."
            exit 1
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          # Copilot must be available as an assignable actor for this repository and token.
          if ! gh api graphql -f query='query($owner:String!, $repo:String!) { repository(owner:$owner, name:$repo) { suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:100) { nodes { login } } } }' -F owner="$OWNER" -F repo="$REPO" | grep -q 'copilot-swe-agent'; then
            echo "::error::Copilot coding agent is not assignable for ${OWNER}/${REPO} with the configured PAT_TOKEN."
            echo "Checklist:"
            echo "  1. Ensure the PAT belongs to a user with Copilot Pro, Pro+, Business, or Enterprise"
            echo "  2. Ensure Copilot coding agent is enabled for this repository/account"
            echo "  3. Check https://github.com/settings/copilot/features for personal repositories"
            echo "  4. Recreate PAT_TOKEN with the required scopes/permissions if needed"
            exit 1
          fi

          created_count=0
          skipped_count=0

          while IFS=$'\t' read -r change_type source_file; do
            [ -z "$change_type" ] && continue
            [ -z "$source_file" ] && continue

            relative_path="${source_file#to_translate/}"
            target_file="translated/${relative_path%.java}.py"
            title="Translate Java to PySpark: ${relative_path}"

            if [ "$change_type" = "A" ]; then
              change_label="new"
              objective_line='Translate the newly added Java source file below into Python code designed for Spark workloads.'
              target_instruction="2. Create the translated Python file at ${target_file}."
            elif [ "$change_type" = "M" ]; then
              change_label="modified"
              objective_line='Update the Python Spark translation for the modified Java source file below.'
              target_instruction="2. Override the existing translated Python file at ${target_file} with the updated translation."
            else
              change_label="missing-translation"
              objective_line='Create the missing Python Spark translation for the Java source file below.'
              target_instruction="2. Create the translated Python file at ${target_file} because no translated version exists yet."
            fi

            existing_count=$(gh issue list \
              --state open \
              --search "\"${title}\" in:title" \
              --limit 100 \
              --json title \
              --jq 'map(select(.title != null)) | length')

            if [ "$existing_count" != "0" ]; then
              echo "Skipping existing open issue: ${title}"
              skipped_count=$((skipped_count + 1))
              continue
            fi

            body_file=$(mktemp)
            printf '%s\n' \
              '## Objective' \
              '' \
              "$objective_line" \
              '' \
              "- Change type: ${change_label}" \
              "- Source file: ${source_file}" \
              "- Target file: ${target_file}" \
              '' \
              '## Requirements' \
              '' \
              "1. Read ${source_file}." \
              "$target_instruction" \
              '3. Preserve the directory structure from to_translate/ under translated/.' \
              '4. Translate the logic into idiomatic Python for Spark workloads.' \
              '5. Keep behavior aligned with the Java source as closely as practical.' \
              '6. Create any missing target directories.' \
              '7. Do not modify or delete the original Java file.' \
              '8. Limit changes to the translated Python output and any minimal supporting updates strictly required for the translation.' \
              '9. Use Claude Opus 4.6 as the model.' \
              '' \
              '## Delivery' \
              '' \
              "- Commit message: auto: translate ${relative_path} to pyspark" \
              > "$body_file"

            issue_url=$(gh issue create \
              --title "$title" \
              --body-file "$body_file")
            rm -f "$body_file"

            issue_number=$(echo "$issue_url" | grep -oE '[0-9]+$')

            echo "Created issue: $issue_url"
            echo "Assigning Copilot coding agent to issue #${issue_number}..."

            gh issue edit "$issue_number" --add-assignee "@copilot" || {
              echo "::error::Failed to assign Copilot to issue #${issue_number}."
              echo "Checklist:"
              echo "  1. Confirm PAT_TOKEN belongs to a Copilot-licensed user"
              echo "  2. Confirm Copilot is visible in the issue assignees list on GitHub.com"
              echo "  3. Note: @copilot assignment is not supported on GitHub Enterprise Server"
              exit 1
            }

            created_count=$((created_count + 1))
            echo "Copilot coding agent assigned to issue #${issue_number}"
          done <<< "${{ steps.files.outputs.files }}"

          echo "Created ${created_count} issue(s); skipped ${skipped_count} existing open issue(s)."
