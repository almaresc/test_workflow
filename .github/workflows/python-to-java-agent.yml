name: Convert Python to Java (Coding Agent)

on:
  push:
    paths:
      - '**.py'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed Python files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM HEAD~1 HEAD -- '*.py' || true)
          if [ -z "$FILES" ]; then
            echo "No Python files changed."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed Python files:"
            echo "$FILES"
            {
              echo "files<<EOF"
              echo "$FILES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue for Copilot coding agent
        id: create_issue
        if: steps.changed.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PAT_TOKEN is not configured."
            echo "Create a classic PAT with repo scope, or a fine-grained token with read access to metadata and read/write access to actions, contents, issues, and pull requests."
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "::error::jq is required to build the Copilot issue payload."
            exit 1
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          BASE_BRANCH="${{ github.event.repository.default_branch }}"

          # Copilot must be available as an assignable actor for this repository and token.
          if ! gh api graphql -f query='query($owner:String!, $repo:String!) { repository(owner:$owner, name:$repo) { suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:100) { nodes { login } } } }' -F owner="$OWNER" -F repo="$REPO" | grep -q 'copilot-swe-agent'; then
            echo "::error::Copilot coding agent is not assignable for ${OWNER}/${REPO} with the configured PAT_TOKEN."
            echo "Checklist:"
            echo "  1. Ensure the PAT belongs to a user with Copilot Pro, Pro+, Business, or Enterprise"
            echo "  2. Ensure Copilot coding agent is enabled for this repository/account"
            echo "  3. Check https://github.com/settings/copilot/features for personal repositories"
            echo "  4. Recreate PAT_TOKEN with the required scopes/permissions if needed"
            exit 1
          fi

          # Build file list for the issue body
          FILE_LIST=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            FILE_LIST="${FILE_LIST}- \`${f}\`"$'\n'
          done <<< "${{ steps.changed.outputs.files }}"

          FILE_COUNT=$(echo "${{ steps.changed.outputs.files }}" | grep -c '[^[:space:]]')
          FIRST_FILE=$(echo "${{ steps.changed.outputs.files }}" | head -1)

          BODY="## Convert Python files to Java

          The following Python files were added or modified in commit ${{ github.sha }} and need to be converted to equivalent Java code:

          ${FILE_LIST}

          ### Instructions
          For each Python file listed above:
          1. Read the Python source code
          2. Create an equivalent Java file inside the \`java_translation/\` subfolder
          3. The Java class name must match the file name with the first letter capitalized (e.g. \`hello.py\` → \`java_translation/Hello.java\`)
          4. Create the \`java_translation/\` directory if it does not exist
          5. Write idiomatic, working Java code
          6. Do **not** modify or delete the original Python files
          7. Use Claude Opus 4.6 as the model

          Commit with message: \`auto: convert Python files to Java\`"

          TITLE="Convert Python to Java: ${FIRST_FILE} (${FILE_COUNT} file(s))"

          echo "Creating issue # for Copilot coding agent with model Claude Opus 4.6..."

          ISSUE_PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg body "$BODY" \
            --arg target_repo "${OWNER}/${REPO}" \
            --arg base_branch "$BASE_BRANCH" \
            '{
              title: $title,
              body: $body,
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: $target_repo,
                base_branch: $base_branch,
                custom_instructions: "",
                custom_agent: "",
                model: "Claude Opus 4.6"
              }
            }')

          ISSUE_RESPONSE=$(printf '%s' "$ISSUE_PAYLOAD" | gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${OWNER}/${REPO}/issues" \
            --input -) || {
              echo "::error::Failed to create and assign the issue to Copilot using Claude Opus 4.6."
              echo "Checklist:"
              echo "  1. Confirm PAT_TOKEN belongs to a Copilot-licensed user"
              echo "  2. Confirm Copilot is visible in the issue assignees list on GitHub.com"
              echo "  3. Confirm the repository allows Copilot coding agent"
              exit 1
            }

          ISSUE_URL=$(printf '%s' "$ISSUE_RESPONSE" | jq -r '.html_url')
          ISSUE_NUMBER=$(printf '%s' "$ISSUE_RESPONSE" | jq -r '.number')

          echo "Created issue: $ISSUE_URL"
          echo "Copilot coding agent assigned to issue #${ISSUE_NUMBER} with model Claude Opus 4.6"
